<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioQuest | Future of Life</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikurd/kurdit-fonts@main/Rabar/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode">

    <!-- Loading Screen -->
    <div id="loader">
        <div class="dna-loader">🧬</div>
    </div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">Bio<span>Quest</span></div>
            <div class="menu-items">
                <div class="lang-box">
                    <button onclick="changeLang('ku')">KU</button>
                    <button onclick="changeLang('en')">EN</button>
                </div>
                <button id="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-3d-wrap">
            <div class="overlay-elements">
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
            </div>
            <h1 id="main-title">BioQuest</h1>
            <p id="sub-title">گەشتێکی زانستی بۆ ناو قوڵایی ژیان</p>
            <div class="hero-btns">
                <a href="cell.html" class="btn-primary">دەست پێ بکە <i class="fas fa-dna"></i></a>
            </div>
        </div>
    </header>

    <section class="info-section">
        <div class="glass-card">
            <div class="card-media">
                <i class="fas fa-microscope big-icon"></i>
            </div>
            <div class="card-text">
                <h2 id="card-h">زانستی خانەناسی</h2>
                <p id="card-p">لێرەدا فێری هەموو وردەکارییەکانی خانە دەبیت بە شێوازێکی مۆدێرن.</p>
                <a href="cell.html" class="btn-outline">بینینی وانەکە</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="dev-card">
                <p>گەشەپێدەر: <span>ژیاو یوسف حسێن</span></p>
            </div>
        </div>
        <p class="copyright">© 2026 BioQuest Project. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
