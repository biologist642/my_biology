<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Plant - Take Care</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif, 'Segoe UI', Tahoma;
        }

        body {
            background-color: #eef2f3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* چوارچێوەی سەرەکی هاوشێوەی وێنەکە */
        .main-frame {
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            background-color: #f7f9f9;
            border-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        /* بەشی لای چەپ (تێکست و زانیاری) */
        .content-side {
            flex: 1.2;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: #27ae60;
        }

        .text-section {
            margin-top: 40px;
            max-width: 500px;
        }

        .main-heading {
            font-size: clamp(40px, 5vw, 65px);
            color: #1a252f;
            line-height: 1.1;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .sub-text {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
            font-family: 'Segoe UI', sans-serif;
        }

        .cta-btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            padding: 12px 35px;
            font-size: 16px;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .cta-btn:hover {
            background-color: #219653;
            transform: translateY(-2px);
        }

        /* ڕووەکە بچووکەکەی خوارەوەی لای چەپ */
        .bottom-plant {
            width: 180px;
            height: auto;
            align-self: flex-start;
            opacity: 0.9;
        }

        /* بەشی لای ڕاست (باکگراوندە سەوزەکە و گەڵا گەورەکە) */
        .image-side {
            flex: 1;
            position: relative;
            background-color: #f7f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شێوە سەوزە نیوە بازنەییەکەی پشتەوە */
        .green-shape {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 85%;
            height: 85%;
            background-color: #52b788;
            border-bottom-left-radius: 500px;
            border-bottom-right-radius: 500px;
            z-index: 1;
            overflow: hidden;
        }

        /* نێڤیگەیشنی ناو بەشە سەوزەکە */
        .top-nav {
            position: absolute;
            top: 30px;
            right: 50px;
            display: flex;
            gap: 30px;
            z-index: 3;
        }

        .top-nav a {
            color: #1a252f;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Segoe UI', sans-serif;
        }

        /* کۆنتێنەری گەڵا گەورەکە بۆ کۆنتڕۆڵکردنی جووڵە */
        .leaf-container {
            position: absolute;
            bottom: 5%;
            right: 5%;
            width: 90%;
            height: auto;
            z-index: 2;
            transform-origin: bottom center;
            /* لێرەدا ئینمەیشنی با لێدانی بۆ دادەنێین */
            animation: windSway 6s ease-in-out infinite alternate;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* کاتێک ماوسی دەبەیتە سەر کەمێک گەورەتر دەبێت و دەسوڕێتەوە */
        .leaf-container:hover {
            transform: scale(1.03) rotate(3deg);
            animation-play-state: paused; /* کاتێک هۆڤەری دەکەی ئینمەیشنە بنەڕەتیەکە ڕادەوەستێت */
        }

        .main-leaf-img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(10px 15px 25px rgba(0,0,0,0.15));
        }

        /* ──── ئەنیمەیشنی جووڵەی گەڵاکان (Motion Effect) ──── */
        @keyframes windSway {
            0% {
                transform: rotate(-2deg) translateY(0px);
            }
            50% {
                transform: rotate(2deg) translateY(-5px) scaleX(1.01);
            }
            100% {
                transform: rotate(-1deg) translateY(3px);
            }
        }

        /* گونجاندن بۆ مۆبایل */
        @media (max-width: 900px) {
            .main-frame {
                flex-direction: column;
                height: auto;
            }
            .content-side {
                padding: 30px;
                order: 2;
            }
            .image-side {
                height: 400px;
                order: 1;
            }
            .green-shape {
                width: 100%;
                right: 0;
                top: 0;
                height: 100%;
                border-radius: 0;
            }
            .top-nav {
                right: 20px;
                top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-frame">
        
        <div class="content-side">
            <div class="logo">plant<span>•</span>home</div>
            
            <div class="text-section">
                <h1 class="main-heading">Take care of<br>your plants.</h1>
                <p class="sub-text">
                    باشترین ڕێنماییەکان بدۆزەرەوە بۆ چاودێریکردنی ڕووەکە ناوخۆییەکانت. شێداری، ڕووناکی و پلەی گەرمی گونجاو دابین بکە بۆ ئەوەی هەمیشە گەشاوە بن.
                </p>
                <a href="#" class="cta-btn">Free Trial</a>
            </div>

            <img class="bottom-plant" src="https://i.ibb.co/Z60gX8L/small-pot-plant.png" alt="ڕووەکی ناو گۆزە" onerror="this.src='https://images.unsplash.com/photo-1545241047-6083a3684587?q=80&w=300'">
        </div>

        <div class="image-side">
            <div class="top-nav">
                <a href="#">About Us</a>
                <a href="#">Services</a>
                <a href="#">Pricing</a>
            </div>
            
            <div class="green-shape"></div>
            
            <div class="leaf-container">
                <img class="main-leaf-img" src="https://i.ibb.co/9v8X8v6/monstera-leaf.png" alt="گەڵای مۆنستێرا" onerror="this.src='https://assets.codegen.gq/placeholder-monstera.png'">
            </div>
        </div>

    </div>

</body>
</html>
