<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماڵپەڕی بایۆلۆجی - سەرەکی</title>
    <style>
        /* ستایلی گشتی */
        body { font-family: 'Tahoma', sans-serif; margin: 0; display: flex; background-color: #f4f7f6; transition: 0.3s; }
        
        /* سایدبار */
        .sidebar { width: 250px; background-color: #1a1a1a; height: 100vh; color: white; padding: 20px; position: fixed; z-index: 1000; }
        .sidebar h2 { text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 15px; margin: 10px 0; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover { background-color: #3498db; padding-right: 25px; }

        /* ناوەڕۆک */
        .content { margin-right: 290px; padding: 40px; flex-grow: 1; min-height: 100vh; display: flex; flex-direction: column; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-grow: 1; }
        h1 { color: #2c3e50; }
        p { font-size: 18px; line-height: 1.8; color: #555; }
        
        /* فووتەر */
        .footer { background-color: #1a1a1a; color: #bdc3c7; text-align: center; padding: 20px; margin-top: 30px; border-radius: 10px; }

        /* ڕێکخستن بۆ مۆبایل */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 10px; }
            .sidebar a { display: inline-block; margin: 5px; padding: 10px; }
            .content { margin-right: 0; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>بایۆلۆجی</h2>
        <a href="index.html">🏠 لاپەڕەی سەرەکی</a>
        <a href="cell.html">🔬 بەشی خانەناسی</a>
        <a href="#">🧬 بۆماوەزانی</a>
    </div>

    <div class="content">
        <div class="card">
            <h1>بەخێرهاتیت بۆ پڕۆژەی بایۆلۆجی</h1>
            <p>ئەمە یەکەم هەنگاوی منە لە دروستکردنی سایتێکی زانستی بە زمانی کوردی.</p>
            <img src="https://images.unsplash.com/photo-1530026405186-ed1f139313f8?w=800" style="width:100%; border-radius:10px; margin-top:20px;">
        </div>

        <div class="footer">
            <p>مافی بڵاوکردنەوە پارێزراوە بۆ © 2026 - پڕۆژەی بایۆلۆجی</p>
            <p>گەشەپێدراوە لەلایەن: <b>ژیاو یوسف حسین</b></p>
        </div>
    </div>

</body>
</html>
