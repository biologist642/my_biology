<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioQuest | ٢٠٢٦</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikurd/kurdit-fonts@main/Rabar/font.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="light-mode">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="splash-logo">BioQuest</h1>
            <div class="loader"></div>
        </div>
    </div>

    <div id="main-content" class="hidden-content">
        <!-- Navigation & Selectors -->
        <nav class="top-nav" data-aos="fade-down">
            <div class="theme-switch">
                <button id="theme-toggle" onclick="toggleTheme()">🌙 مۆدی تاریک</button>
            </div>
            <div class="lang-switcher">
                <button onclick="setLang('en')">EN</button>
                <button onclick="setLang('ar')">AR</button>
                <button onclick="setLang('ku')" class="active-lang">KU</button>
            </div>
        </nav>

        <!-- 3D Biology Header -->
        <header class="hero-section" id="hero-3d-box">
            <div class="hero-inner" id="hero-content">
                <div class="bio-icon-3d">🧬</div>
                <h1 class="main-title">BioQuest</h1>
                <p id="hero-subtitle">گەشتێکی زانستی بۆ ناو قوڵایی ژیان</p>
            </div>
        </header>

        <!-- Animated Tabs -->
        <div class="tab-container" data-aos="fade-up">
            <button class="tab-btn active" id="tab-home" onclick="showSection('home')">سەرەکی</button>
            <button class="tab-btn" id="tab-cell" onclick="window.location.href='cell.html'">خانەناسی</button>
        </div>

        <!-- Content Area -->
        <main class="content-area">
            <div class="info-card" data-aos="zoom-in">
                <div class="card-text">
                    <p id="card-desc">خانە یەکەی بنەڕەتی ژیانە، لێرە هەموو زانیارییەکان فێربە و گەشت بکە بۆ ناو وردەکارییەکان.</p>
                    <a href="cell.html" class="pulse-btn">زیاتر بخوێنەوە</a>
                </div>
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&q=80&w=400" alt="Cell" class="floating-cell">
                </div>
            </div>
        </main>

        <!-- 3D Footer -->
        <footer class="main-footer" id="footer-3d-box">
            <div class="footer-inner" id="footer-content">
                <p>گەشەپێدەری وێب: <span class="dev-name">ژیاو یوسف حسێن</span></p>
                <p>BioQuest ٢٠٢٦ - هەموو مافەکان پارێزراوە</p>
                <div class="footer-3d-icon">🔬</div>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
