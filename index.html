<!DOCTYPE html>
<html lang="ku" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlant</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --green-dark:   #2D5016;
    --green-mid:    #4A7C2F;
    --green-cta:    #3D9A3E;
    --green-light:  #C8E6B0;
    --green-pale:   #E8F5E1;
    --cream:        #F7F5F0;
    --mint-bg:      #D6EDD0;
    --text-dark:    #1A1A1A;
    --text-muted:   #6B7A5E;
    --white:        #FFFFFF;
    --radius-blob:  60% 40% 55% 45% / 50% 60% 40% 50%;
    
    /* Toggle Colors */
    --toggle-bg: rgba(45, 80, 22, 0.1);
    --toggle-active: #00c896;
  }

  /* Dark Mode Overrides */
  body.dark-mode {
    --cream: #12180e;
    --text-dark: #F7F5F0;
    --text-muted: #a3b299;
    --white: #1a2315;
    --mint-bg: #223518;
    --toggle-bg: rgba(255,255,255,0.1);
  }
 
  html { scroll-behavior: smooth; }
 
  body {
    font-family: 'Noto Kufi Arabic', 'Poppins', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }
 
  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 5%;
    background: rgba(247,245,240,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  body.dark-mode nav {
    background: rgba(18, 24, 14, 0.85);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
 
  .logo {
    display: flex; align-items: center; gap: .45rem;
    font-size: 1.2rem; font-weight: 700;
    color: var(--green-dark); text-decoration: none;
  }
  body.dark-mode .logo { color: var(--white); }
  .logo svg { width: 22px; height: 22px; stroke: var(--green-cta); }
 
  .nav-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  /* ── CAPSULE SWITCHERS ── */
  .capsule-toggle {
    display: flex;
    background: var(--toggle-bg);
    border: 1px solid rgba(0,0,0,0.05);
    padding: 3px;
    border-radius: 50px;
    position: relative;
  }
  body.dark-mode .capsule-toggle { border-color: rgba(255,255,255,0.05); }

  .capsule-toggle button {
    background: none;
    border: none;
    padding: .4rem .8rem;
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 50px;
    position: relative;
    z-index: 2;
    transition: color 0.3s ease;
    font-family: inherit;
  }

  .capsule-toggle .slider {
    position: absolute;
    top: 3px; bottom: 3px;
    background: var(--toggle-active);
    border-radius: 50px;
    z-index: 1;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: 0 2px 8px rgba(0, 200, 150, 0.4);
  }

  /* Language Switcher Widths & Positions */
  .lang-toggle .slider { width: 55px; }
  html[dir="rtl"] .lang-toggle[data-active="ku"] .slider { right: 3px; }
  html[dir="rtl"] .lang-toggle[data-active="en"] .slider { right: 58px; width: 48px; }
  html[dir="rtl"] .lang-toggle[data-active="ar"] .slider { right: 106px; width: 52px; }
  
  html[dir="ltr"] .lang-toggle[data-active="ku"] .slider { left: 104px; width: 55px; }
  html[dir="ltr"] .lang-toggle[data-active="en"] .slider { left: 52px; width: 48px; }
  html[dir="ltr"] .lang-toggle[data-active="ar"] .slider { left: 3px; width: 52px; }

  /* Theme Switcher Positions */
  .theme-toggle .slider { width: 52px; }
  .theme-toggle[data-active="light"] .slider { left: 3px; }
  .theme-toggle[data-active="dark"] .slider { left: 55px; width: 52px; }
  html[dir="rtl"] .theme-toggle[data-active="light"] .slider { right: 55px; }
  html[dir="rtl"] .theme-toggle[data-active="dark"] .slider { right: 3px; }

  .capsule-toggle button.active {
    color: #ffffff !important;
  }
 
  /* ── HERO (COMPACTED) ── */
  .hero {
    min-height: 80vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 6rem 5% 2rem;
    position: relative;
    overflow: hidden;
    gap: 2rem;
  }
 
  .hero::before {
    content: '';
    position: absolute;
    top: -15%; right: -5%;
    width: 50%; height: 110%;
    background: var(--mint-bg);
    border-radius: var(--radius-blob);
    animation: morphBlob 12s ease-in-out infinite alternate;
    z-index: 0;
  }
  html[dir="ltr"] .hero::before { right: auto; left: -5%; }
 
  .hero-text { position: relative; z-index: 1; }
 
  .eyebrow {
    display: inline-block;
    font-size: .8rem; font-weight: 700;
    color: var(--green-mid);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp .7s .3s ease forwards;
  }
 
  .hero-text h1 {
    font-size: clamp(2rem, 3.8vw, 3.2rem);
    line-height: 1.2;
    color: var(--text-dark);
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeUp .7s .5s ease forwards;
  }
 
  .hero-text h1 em { font-style: italic; color: var(--green-mid); }
 
  .hero-desc {
    display: flex;
    gap: 1rem;
    font-size: .9rem; line-height: 1.7;
    color: var(--text-muted);
    max-width: 460px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp .7s .7s ease forwards;
  }

  .divider-line {
    width: 3px; background: var(--green-cta); flex-shrink: 0;
  }
 
  .cta-group {
    display: flex; align-items: center;
    opacity: 0;
    animation: fadeUp .7s .9s ease forwards;
  }
 
  .btn-primary {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .85rem 2.4rem;
    background: var(--green-cta);
    color: var(--white);
    font-size: .9rem; font-weight: 600;
    border-radius: 100px;
    text-decoration: none;
    border: none; cursor: pointer;
    transition: background .25s, transform .2s, box-shadow .25s;
    box-shadow: 0 4px 18px rgba(61,154,62,.35);
  }
  .btn-primary:hover {
    background: var(--green-mid);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(61,154,62,.45);
  }
  html[dir="ltr"] .btn-primary svg { transform: scaleX(-1); }
 
  /* ── HERO IMAGE ── */
  .hero-visual {
    position: relative; z-index: 1;
    display: flex; justify-content: center; align-items: center;
  }
 
  .plant-frame {
    position: relative;
    width: clamp(240px, 32vw, 400px);
    height: clamp(300px, 40vw, 460px);
    opacity: 0;
    animation: fadeIn .9s .6s ease forwards;
  }
 
  .plant-main {
    position: absolute; top: 0; right: 0;
    width: 90%; height: 90%;
    object-fit: cover;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    filter: drop-shadow(0 20px 40px rgba(45,80,22,.25));
    animation: float 6s ease-in-out infinite;
  }
  html[dir="ltr"] .plant-main { right: auto; left: 0; }
 
  .plant-secondary {
    position: absolute; bottom: 0; left: 0;
    width: 42%;
    object-fit: cover;
    border-radius: 50%;
    filter: drop-shadow(0 12px 24px rgba(45,80,22,.2));
    animation: float 7s 1s ease-in-out infinite;
  }
  html[dir="ltr"] .plant-secondary { left: auto; right: 0; }
 
  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes morphBlob {
    0%   { border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
    33%  { border-radius: 50% 50% 40% 60% / 60% 40% 55% 45%; }
    100% { border-radius: 55% 45% 45% 55% / 55% 45% 60% 40%; }
  }
 
  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .hero {
      grid-template-columns: 1fr;
      text-align: center;
      padding-top: 7rem;
      min-height: auto;
    }
    .hero::before { width: 80%; height: 50%; top: auto; bottom: 0; right: 50%; transform: translateX(50%); }
    html[dir="ltr"] .hero::before { left: 50%; transform: translateX(-50%); }
 
    .hero-desc { max-width: 100%; justify-content: center; }
    .cta-group { justify-content: center; }
    .hero-visual { order: -1; }
    .plant-frame { width: 280px; height: 340px; }
  }
 
  @media (max-width: 600px) {
    nav { padding: 0.8rem 4%; flex-direction: column; gap: .8rem; text-align: center; }
    .hero { padding-top: 9rem; }
    .capsule-toggle button { padding: .3rem .6rem; font-size: .75rem; }
  }
</style>
</head>
<body class="light-mode">
 
<!-- NAV BAR -->
<nav>
  <a class="logo" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22V12M12 12C12 7 7 4 2 6c0 5 3 9 10 6M12 12c0-5 5-8 10-6-1 5-4 9-10 6"/>
    </svg>
    <span>NovaPlant</span>
  </a>
 
  <div class="nav-controls">
    <!-- Language Slider Switcher -->
    <div class="capsule-toggle lang-toggle" id="langToggle" data-active="ku">
      <div class="slider"></div>
      <button onclick="setLanguage('ar')" id="btn-ar">عربي</button>
      <button onclick="setLanguage('en')" id="btn-en">Eng</button>
      <button onclick="setLanguage('ku')" id="btn-ku" class="active">Kurdî</button>
    </div>

    <!-- Theme Slider Switcher -->
    <div class="capsule-toggle theme-toggle" id="themeToggle" data-active="light">
      <div class="slider"></div>
      <button onclick="setTheme('dark')" id="btn-dark">Dark</button>
      <button onclick="setTheme('light')" id="btn-light" class="active">Light</button>
    </div>
  </div>
</nav>
 
<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-text">
    <span class="eyebrow" id="hero-eyebrow">خزمەتکردنی ڕووەکی ناوماڵ</span>
    <h1 id="hero-title">ئاگاداری <em>ڕووەکەکانت</em> بە.</h1>
    <div class="hero-desc">
      <div class="divider-line"></div>
      <p id="hero-desc-txt">باشترین ڕێنمایی بۆ چاودێریکردنی ڕووەکەکانت؛ ئاو، ڕووناکی و پلەی گەرمی گونجاو بدۆزەرەوە.</p>
    </div>
    <div class="cta-group">
      <a class="btn-primary" href="#">
        <span id="btn-txt">دەست پێبکە</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
 
  <div class="hero-visual">
    <div class="plant-frame">
      <!-- FIXED: SVG Plant Main (All layers and leaves restored) -->
      <svg class="plant-main" viewBox="0 0 400 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg1" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#C8E6B0"/><stop offset="100%" stop-color="#A8D490"/>
          </radialGradient>
          <radialGradient id="leaf1" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#5EA832"/><stop offset="100%" stop-color="#2D5016"/>
          </radialGradient>
          <radialGradient id="leaf2" cx="40%" cy="20%" r="70%">
            <stop offset="0%" stop-color="#4A8C28"/><stop offset="100%" stop-color="#1E3A0D"/>
          </radialGradient>
        </defs>
        <ellipse cx="200" cy="230" rx="190" ry="220" fill="url(#bg1)"/>
        <!-- Main large leaf -->
        <path d="M200 380 Q80 320 60 180 Q50 80 200 40 Q240 100 260 200 Q280 300 200 380Z" fill="url(#leaf1)"/>
        <!-- Leaf veins -->
        <path d="M200 380 Q200 240 200 40" stroke="#2D5016" stroke-width="2" fill="none" opacity=".4"/>
        <path d="M200 200 Q140 160 90 120" stroke="#2D5016" stroke-width="1.5" fill="none" opacity=".3"/>
        <path d="M200 260 Q150 230 110 200" stroke="#2D5016" stroke-width="1.5" fill="none" opacity=".3"/>
        <path d="M200 160 Q250 130 290 100" stroke="#2D5016" stroke-width="1.5" fill="none" opacity=".3"/>
        <!-- Second large leaf -->
        <path d="M200 370 Q310 300 340 170 Q360 80 220 60 Q180 130 180 230 Q180 310 200 370Z" fill="url(#leaf2)" opacity=".9"/>
        <path d="M200 370 Q200 240 220 60" stroke="#1E3A0D" stroke-width="2" fill="none" opacity=".35"/>
        <!-- Third smaller leaf left -->
        <path d="M170 360 Q90 300 70 220 Q60 150 140 130 Q170 180 175 270 Q178 320 170 360Z" fill="#4A7C2F" opacity=".75"/>
      </svg>
 
      <!-- FIXED: SVG Plant Secondary (All details and leaves fully restored) -->
      <svg class="plant-secondary" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg2" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#D6EDD0"/><stop offset="100%" stop-color="#B8D8A0"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="95" fill="url(#bg2)"/>
        <!-- Pot -->
        <path d="M70 160 Q100 180 130 160 L125 145 Q100 155 75 145Z" fill="#8B6914"/>
        <rect x="72" y="138" width="56" height="10" rx="4" fill="#A07820"/>
        <!-- Stem -->
        <line x1="100" y1="138" x2="100" y2="90" stroke="#4A7C2F" stroke-width="3"/>
        <!-- All Leaves restored -->
        <path d="M100 110 Q60 80 50 50 Q80 45 100 90Z" fill="#5EA832"/>
        <path d="M100 95 Q140 65 150 35 Q120 32 100 88Z" fill="#3D7A20"/>
        <path d="M100 125 Q65 120 45 100 Q55 85 100 118Z" fill="#4A7C2F"/>
        <path d="M100 120 Q135 112 155 92 Q148 78 100 116Z" fill="#3D7A20"/>
      </svg>
    </div>
  </div>
</section>
 
<script>
  // Languages Database
  const content = {
    ku: {
      dir: 'rtl', eyebrow: 'خزمەتکردنی ڕووەکی ناوماڵ', title: 'ئاگاداری <em>ڕووەکەکانت</em> بە.',
      desc: 'باشترین ڕێنمایی بۆ چاودێریکردنی ڕووەکەکانت؛ ئاو, ڕووناکی و پلەی گەرمی گونجاو بدۆزەرەوە.',
      btn: 'دەست پێبکە'
    },
    en: {
      dir: 'ltr', eyebrow: 'Indoor Plant Care', title: 'Take care of<br>your <em>plants.</em>',
      desc: 'Discover the best tips for caring for your indoor plants. Choose what best suits your home.',
      btn: 'Get Started'
    },
    ar: {
      dir: 'rtl', eyebrow: 'العناية بالنباتات الداخلية', title: 'اعتني بـ <em>نباتاتك</em> المنزلية.',
      desc: 'اكتشف أفضل النصائح لرعاية نباتاتك؛ اختر ما يناسب بيئتك ومنزلك تماماً.',
      btn: 'ابدأ الآن'
    }
  };

  function setLanguage(lang) {
    const html = document.getElementById('html-tag');
    const toggle = document.getElementById('langToggle');
    
    toggle.setAttribute('data-active', lang);
    document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${lang}`).classList.add('active');
    
    html.setAttribute('lang', lang);
    html.setAttribute('dir', content[lang].dir);
    
    document.getElementById('hero-eyebrow').innerText = content[lang].eyebrow;
    document.getElementById('hero-title').innerHTML = content[lang].title;
    document.getElementById('hero-desc-txt').innerText = content[lang].desc;
    document.getElementById('btn-txt').innerText = content[lang].btn;
  }

  function setTheme(theme) {
    const body = document.body;
    const toggle = document.getElementById('themeToggle');
    
    toggle.setAttribute('data-active', theme);
    document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${theme}`).classList.add('active');
    
    if(theme === 'dark') {
      body.classList.add('dark-mode');
    } else {
      body.classList.remove('dark-mode');
    }
  }
</script>
</body>
</html>
