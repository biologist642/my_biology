<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Plant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #fcfbf7; /* پاشبنەمایەکی نەرم و گونجاو لەجیاتی سپی کەم کەم */
            overflow: hidden;
        }

        /* کۆنتێنەری سەرەکی کورتکراوەتەوە بۆ ئەو شوێنەی خەتت لێداوە */
        .hero-section {
            width: 100%;
            height: 65vh; /* کورتکراوەتەوە بەپێی هێڵە ڕەشەکە */
            position: relative;
            display: flex;
            background-color: #f4f6f4; /* ڕەنگێکی جیاواز لە سپی */
            overflow: hidden;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        /* بەشی لای ڕاست (تێکست و زانیارییەکان) */
        .content-side {
            flex: 1.2;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            z-index: 2;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #1a252f;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .text-section {
            max-width: 550px;
        }

        .main-heading {
            font-size: clamp(30px, 3.5vw, 48px);
            color: #1a252f;
            line-height: 1.3;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .sub-text {
            font-size: 16px;
            color: #556263;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .cta-btn {
            display: inline-block;
            background-color: #00b4d8;
            color: white;
            text-decoration: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            background-color: #0096c7;
            transform: translateY(-2px);
        }

        /* بەشی لای چەپ (شێوە سەوزەکە و گەڵاکە) */
        .image-side {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شێوە سەوزەکە کە ئێستا بە تەواوی دیارە و ون نابێت */
        .green-shape {
            position: absolute;
            top: 0;
            left: 0;
            width: 85%;
            height: 100%;
            background-color: #52b788;
            border-bottom-right-radius: 350px;
            z-index: 1;
        }

        /* گەڵا گەورە مۆیشندارەکە لە شوێنی ئیمەیجە شینەکە */
        .leaf-container {
            position: absolute;
            z-index: 2;
            width: 65%;
            max-width: 380px;
            left: 10%;
            transform-origin: bottom center;
            animation: windSway 6s ease-in-out infinite alternate;
        }

        .main-leaf-img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(10px 15px 25px rgba(0,0,0,0.15));
        }

        /* شێوە زەردەکەی خوارەوە کە داوات کردبوو */
        .yellow-shape-bottom {
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 180px;
            height: 180px;
            background-color: #ffca3a;
            border-radius: 50%;
            z-index: 1;
            opacity: 0.85;
        }

        /* ──── ئەنیمەیشنی مۆوشنی گەڵا ──── */
        @keyframes windSway {
            0% { transform: rotate(-3deg) translateY(0px); }
            50% { transform: rotate(3deg) translateY(-5px); }
            100% { transform: rotate(-1deg) translateY(2px); }
        }

        /* گونجاندن بۆ مۆبایل */
        @media (max-width: 992px) {
            .hero-section {
                height: auto;
                min-height: 100vh;
                flex-direction: column;
            }
            .content-side {
                padding: 40px 20px;
                order: 2;
                align-items: center;
                text-align: center;
            }
            .image-side {
                height: 40vh;
                order: 1;
                width: 100%;
            }
            .green-shape {
                width: 100%;
                border-bottom-right-radius: 150px;
            }
            .leaf-container {
                width: 45%;
                left: auto;
            }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        
        <div class="image-side">
            <div class="green-shape"></div>
            
            <div class="leaf-container">
                <img class="main-leaf-img" src="https://i.ibb.co/9v8X8v6/monstera-leaf.png" alt="Monstera Leaf">
            </div>
        </div>

        <div class="content-side">
            <div class="logo">NOVAPLANT</div>
            
            <div class="text-section">
                <h1 class="main-heading">ئەتڵەسی پێشکەوتووی زانستی ڕووەک</h1>
                <p class="sub-text">
                    گەشتێک بۆ ناو جیهانی پێکهاتە، شێوە و کارلێک و زانستی ڕووەکی.
                </p>
                <a href="#" class="cta-btn">دەستپێبکە</a>
            </div>
        </div>

        <div class="yellow-shape-bottom"></div>
        
    </div>

</body>
</html>
