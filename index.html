<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماڵپەڕی بایۆلۆجی - سەرەکی</title>
    <style>
        /* ستایلی گشتی */
        body { 
            font-family: 'Tahoma', sans-serif; 
            margin: 0; 
            display: flex; 
            background-color: #f4f7f6; 
            overflow-x: hidden;
        }

        /* ئەنیمەیشنی Fade In */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* سایدبار */
        .sidebar { 
            width: 250px; 
            background-color: #1a1a1a; 
            height: 100vh; 
            color: white; 
            padding: 20px; 
            position: fixed; 
            transition: 0.3s;
        }
        .sidebar h2 { text-align: center; color: #3498db; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .sidebar a { 
            color: #ecf0f1; 
            text-decoration: none; 
            display: block; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            transition: all 0.3s ease; 
        }
        .sidebar a:hover { 
            background-color: #3498db; 
            padding-right: 30px; 
            transform: translateX(-5px); 
        }

        /* ناوەڕۆک */
        .content { 
            margin-right: 290px; 
            padding: 40px; 
            flex-grow: 1; 
            animation: fadeIn 1s ease-out;
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        
        img { width: 100%; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* ڕێکخستن بۆ مۆبایل */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                position: relative; 
                padding: 10px; 
                display: flex; 
                flex-wrap: wrap; 
                justify-content: center; 
            }
            .sidebar h2 { width: 100%; font-size: 18px; }
            .sidebar a { margin: 5px; padding: 8px 15px; font-size: 14px; }
            .content { margin-right: 0; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>بایۆلۆجی</h2>
        <a href="index.html">🏠 سەرەکی</a>
        <a href="cell.html">🔬 خانەناسی</a>
        <a href="#">🧬 بۆماوەزانی</a>
    </div>

    <div class="content">
        <div class="card">
            <h1>بەخێرهاتیت بۆ پڕۆژەی بایۆلۆجی</h1>
            <p>ئەم ماڵپەڕە تایبەتە بە بڵاوکردنەوەی زانیارییە زانستییەکان بە زمانی کوردی.</p>
            <img src="https://images.unsplash.com/photo-1530026405186-ed1f139313f8?w=800" alt="Biology">
        </div>
    </div>

</body>
</html>
