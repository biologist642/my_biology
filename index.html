<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioQuest | ٢٠٢٦</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikurd/kurdit-fonts@main/Rabar/font.css" rel="stylesheet">
</head>
<body class="light-mode">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">BioQuest</div>
            <div class="nav-controls">
                <button id="theme-btn" onclick="toggleTheme()">🌙 مۆدی تاریک</button>
                <div class="lang-switcher">
                    <button onclick="changeLang('ku')">Kurdî</button>
                    <button onclick="changeLang('en')">English</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section" id="hero">
        <div class="hero-bg-animation">🧬</div>
        <div class="hero-content">
            <h1 id="main-title">BioQuest</h1>
            <p id="sub-title">گەشتێکی زانستی بۆ ناو قوڵایی ژیان</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="info-card">
            <div class="card-image">
                <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=500" alt="Cell">
            </div>
            <div class="card-detail">
                <h2 id="card-h">زانستی خانە (Cell Biology)</h2>
                <p id="card-p">خانە یەکەی بنەڕەتی پێکهاتنی هەموو زیندەوەرانە. لێرەدا دەتوانیت دەربارەی وردەکارییەکانی خانە فێرببیت.</p>
                <a href="cell.html" class="action-btn" id="btn-text">بچۆ ناو وانە</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>گەشەپێدەر: <span>ژیاو یوسف حسێن</span></p>
            <p>&copy; ٢٠٢٦ BioQuest Project</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
