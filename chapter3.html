<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaEntomo</title>
    <!-- فۆنتی Vazirmatn بۆ نووسینی کوردی -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
        /* باکگراوندی گرادیانتی سەوز بۆ بەشی هیرۆ */
        .hero-gradient {
            background: radial-gradient(circle, #14431b 0%, #081e0e 100%);
        }
    </style>
</head>
<body class="bg-[#fcfaf6] text-gray-900">

    <!-- ================= NAVBAR (ڕێک وەک وێنە سەرەکییەکە) ================= -->
    <nav class="bg-[#fcfaf6] px-6 py-4 flex items-center justify-between border-b border-gray-100/50">
        
        <!-- لای چەپ: دوگمەی ڕووناک، گۆڕینی زمان، و گەڕان -->
        <div class="flex items-center gap-4">
            <!-- دوگمەی سوتچ (ڕووناک) -->
            <div class="flex items-center gap-2">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" checked class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-700"></div>
                </label>
                <span class="text-xs text-gray-700 font-bold">رووناک</span>
            </div>

            <!-- بەشی زمانەکان (شێوازی خڕی هاوشێوەی وێنەکە) -->
            <div class="bg-gray-100/80 p-1 rounded-full flex items-center text-xs font-bold gap-1">
                <span class="bg-[#8b4513] text-white px-3 py-1 rounded-full cursor-pointer">کو</span>
                <span class="text-gray-500 px-2 cursor-pointer hover:text-gray-800">En</span>
                <span class="text-gray-500 px-2 cursor-pointer hover:text-gray-800">عر</span>
            </div>

            <!-- ئایکۆنی گەڕان -->
            <button class="w-9 h-9 rounded-full bg-gray-100/60 hover:bg-gray-200/60 flex items-center justify-center text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
                </svg>
            </button>
        </div>

        <!-- ناوەڕاست: ئایکۆنی پەپوولە بە کاڵی وەک وێنەکە -->
        <div class="hidden md:flex items-center justify-center">
            <svg class="w-6 h-6 text-amber-800/30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21V9m0 0a3 3 0 0 1 3-3h3.75a3 3 0 0 0 3-3V1.5M12 9a3 3 0 0 0-3-3H5.25a3 3 0 0 1-3-3V1.5" />
            </svg>
        </div>

        <!-- لای ڕاست: لۆگۆ و هەمبەرگەر مینیو -->
        <div class="flex items-center gap-4">
            <!-- لۆگۆ و ئایکۆنی مێروو -->
            <div class="flex items-center gap-1.5">
                <span class="text-xl font-black text-[#4a2c11] tracking-tight">NovaEntomo</span>
                <!-- ئایکۆنی مێروو تەنیشت لۆگۆکە -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-[#8b4513]">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm0 0a10.5 10.5 0 0 1-10.5-10.5m10.5 10.5a10.5 10.5 0 0 0 10.5-10.5M12 3a10.5 10.5 0 0 0-10.5 10.5M12 3a10.5 10.5 0 0 1 10.5 10.5" />
                </svg>
            </div>

            <!-- مینیو (Menu Button) -->
            <button class="w-10 h-10 rounded-full bg-gray-100/40 border border-gray-200/60 flex items-center justify-center hover:bg-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-700">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- ================= HERO SECTION (وەک وێنەی دووەم) ================= -->
    <header class="hero-gradient text-white py-32 px-6 text-center relative overflow-hidden">
        <div class="max-w-3xl mx-auto flex flex-col items-center justify-center">
            
            <!-- دەقی بچووک -->
            <span class="text-xs text-amber-400/80 tracking-widest font-bold mb-6">چاپدێری دووەم</span>
            
            <!-- چوارگۆشە هێڵکارییەکە -->
            <div class="w-12 h-12 border-2 border-emerald-700/60 rotate-45 flex items-center justify-center mb-8">
                <div class="w-4 h-4 border border-emerald-600/40"></div>
            </div>

            <!-- ناونیشان -->
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 leading-tight">
                دەستپێکی ئینتۆمۆلۆجی
            </h1>

            <!-- ناونیشانی لاوەکی -->
            <p class="text-sm md:text-base text-gray-300 font-light tracking-wide flex items-center gap-2">
                <span>Introduction to Entomology</span>
                <span class="text-emerald-500">•</span>
                <span>ئینتۆمۆلۆجی</span>
            </p>
            
        </div>
    </header>

</body>
</html>
