<!DOCTYPE html>
<html lang="ku" dir="rtl" id="html-tag" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaEntomo</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* ==========================================================================
           1. ڕەنگەکان و سیستەمی مۆد (تاریک / ڕووناک)
           ========================================================================== */
        :root[data-theme="light"] {
            --bg-main: #f8f6f2;
            --bg-card: #ffffff;
            --text-primary: #2c1a11;
            --text-secondary: #4a3319;
            --accent-color: #8B4513; 
            --navbar-bg: #ffffff; 
            --navbar-text: #2c1a11;
            --card-border: rgba(93, 64, 55, 0.08);
            --hero-border-line: #8B4513;
            
            /* تێکەڵکردنی وێنەکە لەگەڵ ئۆڤەرلایەکی زۆر کاڵ بۆ پاراستنی ڕوونی نووسینەکان */
            --hero-bg: linear-gradient(rgba(248, 246, 242, 0.4), rgba(248, 246, 242, 0.4)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTp7vgxCWbVoqyWg36dmiz_SEiQRyKDxVNOwqt_slHvig&s=10');
            
            /* سێبەری نووسین بۆ دروستکردنی هۆڵۆگرامێکی سپی لە ژێر دەقەکان بۆ خوێندنەوەی ئاسان */
            --text-shadow: 0 0 15px #f8f6f2, 0 0 25px #f8f6f2, 0 0 35px rgba(248, 246, 242, 0.9);
        }

        :root[data-theme="dark"] {
            --bg-main: #0f0907;
            --bg-card: #1c100b;
            --text-primary: #ffffff;
            --text-secondary: #e5d8d2;
            --accent-color: #d27d2d;
            --navbar-bg: #1c100b; 
            --navbar-text: #e5d8d2;
            --card-border: rgba(255, 255, 255, 0.05);
            --hero-border-line: #d27d2d;
            
            --hero-bg: linear-gradient(rgba(15, 9, 7, 0.65), rgba(15, 9, 7, 0.65)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTp7vgxCWbVoqyWg36dmiz_SEiQRyKDxVNOwqt_slHvig&s=10');
            
            --text-shadow: 0 0 15px #0f0907, 0 0 25px #0f0907, 0 0 35px rgba(15, 9, 7, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: 'Poppins', 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        body.page-transition {
            opacity: 0;
            transform: scale(0.97);
        }

        /* ==========================================================================
           2. ناڤبار
           ========================================================================== */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background-color: var(--navbar-bg);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08); z-index: 1000;
        }

        .nav-right-group, .controls { position: relative; z-index: 5; }
        .nav-right-group { display: flex; align-items: center; gap: 15px; }
        
        .back-home-btn { 
            background: rgba(139, 69, 19, 0.06); 
            border: 1px solid rgba(139, 69, 19, 0.15); 
            font-size: 14px; 
            font-weight: 600;
            color: var(--navbar-text); 
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 30px;
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .back-home-btn i {
            font-size: 18px;
            transition: transform 0.3s ease;
        }
        .back-home-btn:hover {
            background-color: var(--accent-color);
            color: #ffffff !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }
        .back-home-btn:hover i {
            transform: scale(1.2) rotate(-10deg);
        }
        
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 26px; color: var(--accent-color); }
        .logo h2 { font-size: 22px; font-weight: 700; color: var(--navbar-text); }
        .logo h2 span { color: var(--accent-color); }

        .controls { display: flex; align-items: center; gap: 20px; }
        
        .lang-links-wrapper { display: flex; gap: 4px; background: rgba(0, 0, 0, 0.05); padding: 4px; border-radius: 30px; }
        .lang-btn { background: none; border: none; padding: 6px 14px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer; color: var(--navbar-text); opacity: 0.6; font-family: inherit; transition: all 0.3s ease; }
        .lang-btn.active { background: var(--accent-color); color: white !important; opacity: 1; }

        .theme-controller-wrapper { display: flex; align-items: center; gap: 8px; color: var(--navbar-text); font-size: 13px; font-weight: 600; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 46px; }
        .theme-switch input { display: none; }
        .slider { background-color: rgba(0,0,0,0.1); bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: #fff; bottom: 3px; content: ""; height: 18px; left: 4px; position: absolute; width: 18px; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* سێرچ بار */
        .search-container-inline { display: flex; align-items: center; position: relative; }
        .nav-search-btn { 
            background: rgba(139, 69, 19, 0.05); border: 1px solid rgba(139, 69, 19, 0.1); 
            color: var(--navbar-text); font-size: 20px; cursor: pointer; 
            width: 42px; height: 42px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }
        .search-input-inline {
            width: 0; opacity: 0; pointer-events: none; padding: 0;
            border: 1px solid transparent; border-radius: 30px; height: 40px;
            font-size: 14px; font-family: inherit; background: var(--bg-card);
            color: var(--text-primary); outline: none; position: absolute; left: 50px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
        }
        html[dir="ltr"] .search-input-inline { left: auto; right: 50px; }
        .search-container-inline.active .search-input-inline {
            width: 220px; opacity: 1; pointer-events: auto; padding: 0 15px;
            border-color: var(--accent-color); box-shadow: 0 4px 10px rgba(139, 69, 19, 0.1);
        }

        /* ==========================================================================
           3. نێوۆک و دیزاینی هێرۆ (نوێکراوەتەوە: بەبێ چوارگۆشەی سپی)
           ========================================================================== */
        .hero-section-wrapper {
            position: relative; 
            width: 100%; 
            min-height: 65vh; /* درێژی کورت کراوەتەوە */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 110px 20px 50px 20px; 
            overflow: hidden; 
            background: var(--hero-bg) no-repeat center/cover; /* لێرەدا ئۆڤەرلای وێنەکە جێبەجێ دەبێت */
            border-bottom: 3px solid var(--hero-border-line);
        }

        .hero-layout-container {
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            position: relative; 
            z-index: 5;
        }

        /* لادانی تەواوی باکگراوند و بۆردەری سپی بۆ دەرکەوتنی جوانی مێرووەکان */
        .hero-text-side { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            width: 100%;
            background: transparent; /* لادانی باکگراوند */
            padding: 0;
            border-radius: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
            border: none;
        }
        
        .hero-bold-title { 
            font-size: 48px; 
            font-weight: 800; 
            line-height: 1.25; 
            color: var(--accent-color); 
            margin-bottom: 15px; 
            letter-spacing: -0.5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            text-shadow: var(--text-shadow); /* زیادکردنی سێبەری سپی هۆڵۆگرام */
        }
        
        .hero-bold-title span { 
            font-size: 26px; 
            font-weight: 700; 
            color: var(--text-primary); 
            letter-spacing: 0px; 
            text-shadow: var(--text-shadow);
        }

        .hero-paragraph { 
            font-size: 19px; 
            line-height: 1.8; 
            color: var(--text-secondary); 
            max-width: 680px; 
            margin-bottom: 25px; 
            text-shadow: var(--text-shadow);
            font-weight: 700; /* تۆخکردنی دەقەکە بۆ دیاربوونی باشتر */
        }

        .hero-cta-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            padding: 12px 36px; 
            font-size: 15px; 
            font-weight: 700; 
            color: #ffffff !important; 
            background: var(--accent-color); 
            border-radius: 50px; 
            text-decoration: none; 
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.25); 
            cursor: pointer; 
            border: none; 
            transition: all 0.3s ease;
        }
        .hero-cta-btn:hover { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.35); 
        }

        /* ==========================================================================
           4. ڕیسپۆنسڤ
           ========================================================================== */
        @media (max-width: 992px) {
            .hero-section-wrapper { min-height: 60vh; padding-top: 100px; }
            .hero-bold-title { font-size: 38px; }
            .hero-bold-title span { font-size: 22px; }
            .hero-paragraph { font-size: 17px; }
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 15px; height: 65px; }
            .logo h2 { font-size: 14px; }
            .logo-icon { font-size: 22px; }
            
            .back-home-btn { padding: 6px 12px; font-size: 12px; gap: 4px; }
            .back-home-btn i { font-size: 15px; }
            
            .controls { gap: 8px; }
            .lang-links-wrapper { padding: 2px; }
            .lang-btn { padding: 4px 8px; font-size: 11px; }
            
            .theme-controller-wrapper .theme-status-text { display: none; }
            .theme-switch { width: 38px; height: 20px; }
            .slider:before { height: 14px; width: 14px; left: 3px; bottom: 3px; }
            input:checked + .slider:before { transform: translateX(18px); }
        }
        
        @media (max-width: 430px) {
            .logo h2 { display: none; }
            .back-home-btn span { display: none; } 
            .back-home-btn { padding: 8px; border-radius: 50%; }
            .hero-bold-title { font-size: 30px; }
            .hero-bold-title span { font-size: 16px; }
            .hero-paragraph { font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="nav-right-group">
            <a href="index.html" class="back-home-btn" id="back-to-home">
                <i class="ph ph-house"></i>
                <span id="back-home-text">گەڕانەوە بۆ سەرەکی</span>
            </a>
            <div class="logo">
                <i class="ph ph-bug logo-icon"></i> <h2>Nova<span>Entomo</span></h2>
            </div>
        </div>
    
        <div class="controls">
            <div class="search-container-inline" id="search-container">
                <input type="text" class="search-input-inline" placeholder="گەڕان..." id="search-input">
                <button class="nav-search-btn" id="nav-search-trigger" aria-label="Search"><i class="ph ph-magnifying-glass"></i></button>
            </div>
            
            <div class="lang-links-wrapper">
                <button class="lang-btn active" data-lang="ku">کو</button>
                <button class="lang-btn" data-lang="en">En</button>
                <button class="lang-btn" data-lang="ar">عر</button>
            </div>
            <div class="theme-controller-wrapper">
                <span class="theme-status-text">ڕووناک</span>
                <label class="theme-switch">
                    <input type="checkbox" class="theme-checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </div>
    </header>

    <!-- ================= HERO SECTION ================= -->
    <section class="hero-section-wrapper">
        <div class="hero-layout-container">
            <div class="hero-text-side">
                <h1 class="hero-bold-title" id="hero-title">
                    بەشی یەکەم <span id="hero-title-sub">دەستپێکێک بۆ مێرووناسی</span>
                </h1>
                <p class="hero-paragraph" id="hero-desc">
                    مێرووناسی؛ گەشتێکە بۆ ناو جیهانی بوونەوەرە هەرە بچووکەکان، کە گەورەترین کاریگەرییان لەسەر گۆی زەوی هەیە.
                </p>
                
                <a href="#chapters" class="hero-cta-btn" id="hero-btn-text">
                    دەستپێکردنی گەشتەکە <i class="ph ph-arrow-down"></i>
                </a>
            </div>
        </div>
    </section>

    <script>
        const translations = {
            ku: {
                title: "بەشی یەکەم <span id='hero-title-sub'>دەستپێکێک بۆ مێرووناسی</span>",
                desc: "مێرووناسی؛ گەشتێکە بۆ ناو جیهانی بوونەوەرە هەرە بچووکەکان، کە گەورەترین کاریگەرییان لەسەر گۆی زەوی هەیە.",
                btnText: "دەستپێکردنی گەشتەکە",
                light: "ڕووناک",
                dark: "تاریک",
                searchPlaceholder: "گەڕان...",
                backHome: "گەڕانەوە بۆ سەرەکی"
            },
            en: {
                title: "Chapter One <span>Introduction to Entomology</span>",
                desc: "Entomology; a journey into the world of the tiniest creatures, which have the greatest impact on Earth.",
                btnText: "Start Exploring",
                light: "Light",
                dark: "Dark",
                searchPlaceholder: "Search...",
                backHome: "Back to Home"
            },
            ar: {
                title: "الفصل الأول <span>مقدمة في علم الحشرات</span>",
                desc: "علم الحشرات؛ رحلة إلى عالم أصغر الكائنات الحية التي تمتلك التأثير الأكبر على كوكب الأرض.",
                btnText: "ابدأ الرحلة",
                light: "فاتح",
                dark: "مظلم",
                searchPlaceholder: "بحث...",
                backHome: "العودة للرئيسية"
            }
        };

        const htmlTag = document.getElementById('html-tag');
        const searchContainer = document.getElementById('search-container');
        const searchInput = document.getElementById('search-input');

        function applyLanguage(lang) {
            const data = translations[lang] || translations['ku'];
            
            const titleEl = document.getElementById('hero-title');
            if (titleEl) titleEl.innerHTML = data.title;
            
            const descEl = document.getElementById('hero-desc');
            if (descEl) descEl.innerText = data.desc;
            
            const heroBtn = document.getElementById('hero-btn-text');
            if (heroBtn) heroBtn.innerHTML = `${data.btnText} <i class="ph ph-arrow-down"></i>`;
            
            const backHomeText = document.getElementById('back-home-text');
            if (backHomeText) backHomeText.innerText = data.backHome;

            if (searchInput) searchInput.placeholder = data.searchPlaceholder;

            document.querySelectorAll('.theme-status-text').forEach(el => {
                const isDark = htmlTag.getAttribute('data-theme') === 'dark';
                el.innerText = isDark ? data.dark : data.light;
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // کلیک لەسەر دوگمەی گەڕانەوە بە ئەنیمەیشنی نەرم
        document.getElementById('back-to-home').addEventListener('click', function(e) {
            e.preventDefault();
            const targetUrl = this.getAttribute('href');
            document.body.classList.add('page-transition');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 450);
        });

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const selectedLang = this.getAttribute('data-lang');
                htmlTag.setAttribute('dir', selectedLang === 'en' ? 'ltr' : 'rtl');
                htmlTag.setAttribute('lang', selectedLang);
                applyLanguage(selectedLang);
            });
        });

        document.querySelectorAll('.theme-checkbox').forEach(chk => {
            chk.addEventListener('change', function(e) {
                const theme = e.target.checked ? 'dark' : 'light';
                htmlTag.setAttribute('data-theme', theme);
                document.querySelectorAll('.theme-checkbox').forEach(c => c.checked = e.target.checked);
                
                const currentLang = htmlTag.getAttribute('lang') || 'ku';
                document.querySelectorAll('.theme-status-text').forEach(el => {
                    el.innerText = theme === 'dark' ? translations[currentLang].dark : translations[currentLang].light;
                });
            });
        });

        document.getElementById('nav-search-trigger').addEventListener('click', (e) => {
            e.stopPropagation();
            searchContainer.classList.toggle('active');
            if(searchContainer.classList.contains('active')) {
                searchInput.focus();
            }
        });

        document.addEventListener('click', (e) => {
            if (!searchContainer.contains(e.target)) {
                searchContainer.classList.remove('active');
            }
        });

        applyLanguage('ku');
    </script>
</body>
</html>
