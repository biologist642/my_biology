<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خانەناسی - Cytology</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; margin: 0; display: flex; background-color: #f4f7f6; }
        
        /* ئەنیمەیشنی Pulse بۆ وێنە */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .sidebar { width: 250px; background-color: #1a1a1a; height: 100vh; color: white; padding: 20px; position: fixed; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 15px; margin: 10px 0; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover { background-color: #e67e22; padding-right: 30px; }
        
        .content { margin-right: 290px; padding: 40px; flex-grow: 1; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); animation: fadeIn 0.8s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .cell-img { width: 100%; border-radius: 10px; animation: pulse 4s infinite ease-in-out; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; }
            .sidebar a { margin: 5px; padding: 8px; }
            .content { margin-right: 0; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="text-align: center; color: #e67e22;">بایۆلۆجی</h2>
        <a href="index.html">🏠 سەرەکی</a>
        <a href="cell.html">🔬 خانەناسی</a>
    </div>

    <div class="content">
        <div class="card">
            <h1>زانستی خانەناسی (Cytology)</h1>
            <p>خانە بچووکترین یەکەی پێکهاتن و فرمانی زیندەوەرانە.</p>
            <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?w=800" class="cell-img" alt="Cell">
            
            <h3 style="margin-top:30px; color: #2c3e50;">ڤیدیۆی فێرکاری</h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/8IlzKri08kk" allowfullscreen></iframe>
            </div>
        </div>
    </div>

</body>
</html>
