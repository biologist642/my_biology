<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioQuest | زانیاری خانە</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikurd/kurdit-fonts@main/Rabar/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> گەڕانەوە</a>
            <div class="logo">Bio<span>Quest</span></div>
        </div>
    </nav>

    <div class="cell-details">
        <div class="container">
            <h1 class="fade-in">پێکهاتەی خانە (Cell Structure)</h1>
            <div class="grid-layout">
                <div class="detail-box">
                    <i class="fas fa-atom icon-spin"></i>
                    <h3>ناوک (Nucleus)</h3>
                    <p>ناوک مێشکی خانەیە و هەموو زانیارییە بۆماوەییەکانی تێدایە.</p>
                </div>
                <div class="detail-box">
                    <i class="fas fa-bolt icon-pulse"></i>
                    <h3>مایتۆکۆندریا</h3>
                    <p>سەرچاوەی وزەی خانەیە و کردارە زیندەگییەکانی تێدا دەکرێت.</p>
                </div>
            </div>
            <!-- بەشی ڤیدیۆ -->
            <div class="video-container">
                <img src="image_5b2cfa.png" style="width:100%; border-radius:15px;">
                <p>ڤیدیۆی فێرکاری دەربارەی دابەشبوونی خانە</p>
            </div>
        </div>
    </div>

    <footer>
        <p>گەشەپێدەر: <span>ژیاو یوسف حسێن</span></p>
    </footer>
    <script src="script.js"></script>
