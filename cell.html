<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioQuest | زانستی خانە</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikurd/kurdit-fonts@main/Rabar/font.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cell-only-page">

    <!-- دوگمەی گەڕانەوەی سەرپێیی (Floating) -->
    <a href="index.html" class="floating-back">🏠 گەڕانەوە</a>

    <main class="responsive-wrapper">
        <section class="cell-hero-mini">
            <h1 class="animate-text">زانستی خانەناسی</h1>
            <p>گەشتێک بۆ ناو وردەکارییەکانی ژیان</p>
        </section>

        <div class="main-grid">
            <!-- کارتی زانیاری -->
            <div class="info-card reveal">
                <h2>بناغەی ژیان</h2>
                <p>خانە بچووکترین یەکەی پەیکەری و فرمانییە لە زیندەوەراندا. هەموو زیندەوەرەکان لە خانە پێکهاتوون و لێرەوە ژیان دەستپێدەکات.</p>
                <img src="https://images.unsplash.com/photo-1559757175-5700dde675bc?w=800" alt="Cell" class="res-img">
            </div>

            <!-- بەشی مۆشن و ڤیدیۆ -->
            <div class="video-card reveal">
                <h2>فێربوونی بینراو</h2>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/8IlzKri08kk" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <!-- پێکهاتەکان بە شێوەی لیستێکی جوان -->
        <section class="parts-list reveal">
            <div class="item"><span>🧬</span> ناوک (Nucleus)</div>
            <div class="item"><span>⚡</span> مایتۆکۆندریا</div>
            <div class="item"><span>🧪</span> سایتۆپلازم</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
